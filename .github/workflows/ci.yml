name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: sunkream_test
          POSTGRES_USER: sunkream
          POSTGRES_PASSWORD: sunkream
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sunkream"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run migrations
        env:
          SECRET_KEY: test-secret-key
          DEBUG: "False"
          DATABASE_URL: postgres://sunkream:sunkream@localhost:5432/sunkream_test
        run: uv run python manage.py migrate

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key
          DEBUG: "False"
          DATABASE_URL: postgres://sunkream:sunkream@localhost:5432/sunkream_test
        run: uv run pytest -v

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sunkream-api .
