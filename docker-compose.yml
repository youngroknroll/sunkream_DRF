services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: sunkream
      POSTGRES_USER: sunkream
      POSTGRES_PASSWORD: sunkream
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sunkream"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             gunicorn sunkream_api.wsgi:application --bind 0.0.0.0:8000 --workers 3"

volumes:
  pgdata:
